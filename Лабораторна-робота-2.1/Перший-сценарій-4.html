<!-- начало Правильний n-кутник -->
<script>var n = 6;
var R2 = 5;
var side = 2 * R2 * Math.tan(Math.PI / n);
var P = n * side;
var S_polygon = (P * R2) / 2;
document.write("<h3>Правильний n-кутник</h3>");
document.write("n = " + n + ", R = " + R2);
document.write("<br> Сторона = " + side.toFixed(2));
document.write("<br> Периметр = " + P.toFixed(2));
document.write("<br> Площа = " + S_polygon.toFixed(2))
</script>

<p>Формула: Правильний n-кутник</p>
