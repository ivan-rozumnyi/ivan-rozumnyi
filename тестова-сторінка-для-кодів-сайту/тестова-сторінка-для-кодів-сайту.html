<!-- структура для работи страница со всеми кодом и текстом-->
<!doctype html>

<!-- структура для работи страници поиска в интернете с укр букви-->
<html lang="uk">
<head>
    <!-- мета структури сайта что би работала страница с укр букви-->
    <meta charset="UTF-8">

    <!-- главное название страници -->
    <title>тест</title>

    <!-- иконка для сайта ico и png -->
    <link rel="icon" href="/ivan-rozumnyi/картинки-для-сайта/картинка2.png" type="image/png">

    <!-- структура для работи страница css сайта -->
    <link rel="stylesheet" href="тестова-сторінка-для-кодів-сайту.css">
</head>

<body>

<!-- главний текст с жирним шрифтом -->
<h1 id="top">тест</h1>
<hr>

<!-- главная картинка -->
<p>
    <img src="/ivan-rozumnyi/картинки-для-сайта/картинка1.png" width="200" alt="картинка1.png">
</p>

<!-- главное центр меню -->
<p>
    <a class="text-test1" href="/ivan-rozumnyi/">Повернутися на головний сайт</a>
</p>

<!-- текст с жирним шрифтом -->
<h2>тест</h2>

<!-- центр текст с точкой -->
<p>• тест<br>
</p>

<!-- описание лаби -->
<p>
    <em>тест</em>
</p>

<!-- оступ текста -->
<br>
<p>
    <a href="/ivan-rozumnyi/">Повернутися на головний сайт</a>
</p>

<!-- кнопка вниз -->
<p class="right">
    <a href="#bottom">Донизу</a>
</p>

<div id="bottom"></div>

<!-- кнопка верх -->
<p class="right">
    <a href="#top">Угору</a>
</p>

<!-- описание кто сделал и права сайта-->
<p class="text-test">Сторінка зроблена (Розумним Іваном) – групи 355</p>

<!-- права сайта и кто сделал -->
<p>
    <footer> Сторінка зроблена в 2026 (Розумним Іваном) – групи 355</footer>
</p>

<!-- конец структури сайта -->
</body>
</html>
