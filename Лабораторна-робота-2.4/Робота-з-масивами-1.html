<!doctype html>

<html>
<head>
    <meta charset="utf-8">
    <title>Робота з масивами No1</title>
</head>
<body bgcolor="#EEEEEE" text="black" link="blue">

<h1 align="center">Робота з масивами No1</h1>
<hr>

<!-- главная картинка -->
<p align="center">
    <img src="/ivan-rozumnyi/картинки-для-сайта/картинка1.png" width="200">
</p>

<script type="text/javascript">
var country = ['Україна', 'Германія', 'Італія', 'Россия', 'Австралія',
'Южна Амеріка', 'Євразія', 'Африка', 'Антарктида'];
var animal = ['Лев', 'Тигр', 'Орел', 'Воробей', 'Снігур', 'Голуб',
'Рись', 'Ведмідь'];
var a = [1, 22, 10, 12, 5];
var continent = country.splice(5, 4);
document.write("continent: " + continent + "<br><br>");
var bird = animal.splice(2, 4);
document.write("bird: " + bird + "<br><br>");
var contibird = continent.concat(bird);
document.write("contibird: " + contibird + "<br><br>");
contibird.unshift("Северная Амеріка");
contibird.push("Попугай");
document.write("Після додавання: " + contibird + "<br><br>");
for (var i = 0; i < a.length - 1; i++) {
    for (var j = 0; j < a.length - 1 - i; j++) {
        if (a[j] > a[j + 1]) {
            var temp = a[j];
            a[j] = a[j + 1];
            a[j + 1] = temp;
        }
    }
}
document.write("Відсортований масив a: " + a);
</script>

<br>

    <a href="Робота-з-масивами-сторінка">Повернутися на Робота з масивами сторінку</a>
</p>

</body>
