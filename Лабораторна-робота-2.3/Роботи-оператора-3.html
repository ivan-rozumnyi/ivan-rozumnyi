<!-- Оператора switch -->
<script>
var trans;
var beast = prompt("Введіть назву животного", "dog");
switch (beast) {
case "dog":
trans = "собака";
break;
case "cat":
trans = "кошка";
break;
case "cow":
trans = "корова";
break;
default:
trans = "невідома тварина"
}
alert(beast + " — " + trans);
</script>
